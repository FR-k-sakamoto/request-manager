services:
  postgres:
    image: postgres:16-alpine
    container_name: request-manager-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: request_manager
      TZ: Asia/Tokyo
    ports:
      - "5532:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d request_manager"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
